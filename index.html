<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>家庭記帳</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: -apple-system; margin:0; background:#f5f5f5;}
.container { padding:16px; }
.card { background:white; padding:16px; border-radius:12px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,0.05);}
input,button { width:100%; padding:10px; margin-top:8px; border-radius:8px; border:1px solid #ddd;}
button { background:#007AFF; color:white; border:none;}
.tabs { display:flex; position:fixed; bottom:0; width:100%; background:white; border-top:1px solid #ddd;}
.tabs button { flex:1; border:none; background:white; padding:12px;}
.active { font-weight:bold; color:#007AFF;}
.hidden { display:none;}
</style>

</head>

<body>

<div class="container">

<!-- 記帳 -->

<div id="tab-expense">
<div class="card">
<h3>新增記帳</h3>
<input id="amount" type="number" placeholder="金額">
<input id="category" placeholder="分類">
<input id="note" placeholder="備註">
<div id="hint"></div>
<button onclick="saveRecord()">儲存</button>
</div>

<div class="card">
<h3>記錄</h3>
<ul id="recordList"></ul>
</div>
</div>

<!-- 圖表 -->

<div id="tab-chart" class="hidden">
<div class="card">
<h3>分類統計</h3>
<canvas id="chart"></canvas>
</div>
</div>

<!-- 地點 -->

<div id="tab-location" class="hidden">
<div class="card">
<h3>新增地點</h3>
<input id="locName" placeholder="名稱">
<input id="locCategory" placeholder="分類">
<input id="locNote" placeholder="備註">
<input id="locRadius" placeholder="範圍(150)">
<button onclick="addLocation()">用GPS新增</button>
</div>

<div class="card">
<ul id="locationList"></ul>
</div>
</div>

</div>

<!-- tabs -->

<div class="tabs">
<button onclick="showTab('expense')" class="active">記帳</button>
<button onclick="showTab('chart')">圖表</button>
<button onclick="showTab('location')">地點</button>
</div>

<script type="module">
// ===== Firebase =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCflvPNFJpZwdLedNuyAFxG_4Fl8g0yuXU",
  authDomain: "family-expense-d3fc6.firebaseapp.com",
  projectId: "family-expense-d3fc6",
  storageBucket: "family-expense-d3fc6.firebasestorage.app",
  messagingSenderId: "1082949186120",
  appId: "1:1082949186120:web:b08dede5942191c6749e7d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== familyId =====
const familyId = "demo-family";

// ===== GPS =====
let lat,lng;
navigator.geolocation.getCurrentPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;
});

// ===== 資料 =====
const recordRef = collection(db,"records");
const locRef = collection(db,"locations");

// ===== 記帳 =====
window.saveRecord = async ()=>{
 await addDoc(recordRef,{
  familyId,
  amount:+amount.value,
  category:category.value,
  note:note.value,
  time:new Date().toISOString()
 });
};

// ===== 即時監聽（關鍵）=====
onSnapshot(recordRef,snap=>{
 const data=[];
 snap.forEach(doc=>{
  const d=doc.data();
  if(d.familyId===familyId){
    data.push({...d,id:doc.id});
  }
 });

 renderRecords(data);
 renderChart(data);
});

// ===== UI =====
function renderRecords(data){
 recordList.innerHTML=data.map(r=>`
 <li>
 ${r.amount} - ${r.category}
 <button onclick="del('${r.id}')">刪</button>
 </li>`).join("");
}

// ===== 刪除 =====
window.del = async(id)=>{
 await deleteDoc(doc(db,"records",id));
};

// ===== 圖表（修正）=====
let chart;
function renderChart(data){
 const map={};
 data.forEach(r=>map[r.category]=(map[r.category]||0)+r.amount);

 if(chart) chart.destroy();

 chart=new Chart(chartCanvas,{
  type:"doughnut",
  data:{
   labels:Object.keys(map),
   datasets:[{data:Object.values(map)}]
  }
 });
}

// ===== 地點 =====
window.addLocation = async ()=>{
 await addDoc(locRef,{
  familyId,
  name:locName.value,
  lat, lng,
  radius:+locRadius.value||150,
  category:locCategory.value,
  note:locNote.value
 });
};

onSnapshot(locRef,snap=>{
 const data=[];
 snap.forEach(doc=>{
  const d=doc.data();
  if(d.familyId===familyId){
    data.push({...d,id:doc.id});
  }
 });
 renderLocations(data);
});

function renderLocations(data){
 locationList.innerHTML=data.map(l=>`
 <li>${l.name} (${l.radius}m)
 <button onclick="delLoc('${l.id}')">刪</button>
 </li>`).join("");
}

window.delLoc = async(id)=>{
 await deleteDoc(doc(db,"locations",id));
};

// ===== tab =====
window.showTab=(t)=>{
 ["expense","chart","location"].forEach(id=>{
  document.getElementById("tab-"+id).classList.add("hidden");
 });
 document.getElementById("tab-"+t).classList.remove("hidden");
 document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
 event.target.classList.add("active");
};
</script>

</body>
</html>
