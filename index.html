<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭記帳</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<!-- 記帳 -->

<div id="tab-expense" class="tab">
  <div class="card">
    <h2>新增記帳</h2>
    <input id="amount" type="number" placeholder="金額">
    <input id="category" placeholder="分類">
    <input id="note" placeholder="備註">
    <div id="hint" class="hint"></div>
    <button class="primary" onclick="saveRecord()">儲存</button>
  </div>

  <div class="card">
    <h2>記錄</h2>
    <ul id="recordList"></ul>
  </div>
</div>

<!-- 圖表 -->

<div id="tab-chart" class="tab hidden">
  <div class="card">
    <h2>分類統計</h2>
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- 地點 -->

<div id="tab-location" class="tab hidden">
  <div class="card">
    <h2>新增地點</h2>
    <input id="locName" placeholder="名稱">
    <input id="locCategory" placeholder="分類">
    <input id="locNote" placeholder="備註">
    <input id="locRadius" placeholder="範圍(150)">
    <button class="primary" onclick="addLocation()">用GPS新增</button>
  </div>

  <div class="card">
    <h2>地點列表</h2>
    <ul id="locationList"></ul>
  </div>
</div>

</div>

<!-- 底部 tab -->

<div class="tabbar">
  <button onclick="showTab('expense', this)" class="active">💰<span>記帳</span></button>
  <button onclick="showTab('chart', this)">📊<span>圖表</span></button>
  <button onclick="showTab('location', this)">📍<span>地點</span></button>
</div>

<script type="module">
// Firebase（保留你原本設定）
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCflvPNFJpZwdLedNuyAFxG_4Fl8g0yuXU",
  authDomain: "family-expense-d3fc6.firebaseapp.com",
  projectId: "family-expense-d3fc6",
  storageBucket: "family-expense-d3fc6.firebasestorage.app",
  messagingSenderId: "1082949186120",
  appId: "1:1082949186120:web:b08dede5942191c6749e7d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const familyId = "demo-family";
const recordRef = collection(db,"records");
const locRef = collection(db,"locations");

let chart;
let currentLocations = [];

// ===== 記帳 =====
window.saveRecord = async ()=>{
  await addDoc(recordRef,{
    familyId,
    amount:+amount.value,
    category:category.value,
    note:note.value,
    time:new Date().toISOString()
  });
};

// ===== 即時同步 =====
onSnapshot(locRef, snap => {
  const data = [];

  snap.forEach(doc => {
    const d = doc.data();
    if (d.familyId === familyId) {
      data.push({ ...d, id: doc.id });
    }
  });

  renderLocations(data);

  currentLocations = data;

  // 🔥 關鍵這行
  applyGPSAutoFill(currentLocations);
});

function renderRecords(data){
  recordList.innerHTML = data.map(r=>`
    <li>
      <div class="row">
        <div>
          <strong>${r.amount}</strong>
          <div class="sub">${r.category} · ${r.note}</div>
        </div>
        <button class="danger" onclick="del('${r.id}')">刪</button>
      </div>
    </li>
  `).join("");
}

window.del = async(id)=>{
  await deleteDoc(doc(db,"records",id));
};

// ===== 圖表 =====
function renderChart(data){
  const map={};
  data.forEach(r=>map[r.category]=(map[r.category]||0)+r.amount);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"doughnut",
    data:{
      labels:Object.keys(map),
      datasets:[{data:Object.values(map)}]
    }
  });
}

// ===== 地點 =====
window.addLocation = async ()=>{
  navigator.geolocation.getCurrentPosition(async pos=>{
    await addDoc(locRef,{
      familyId,
      name:locName.value,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      radius:+locRadius.value||150,
      category:locCategory.value,
      note:locNote.value
    });
  });
};

onSnapshot(locRef,snap=>{
  const data=[];
  snap.forEach(d=>{
    if(d.data().familyId===familyId){
      data.push({...d.data(),id:d.id});
    }
  });
  renderLocations(data);
});

if (t === "expense") {
  applyGPSAutoFill(currentLocations);
}

function applyGPSAutoFill(locations) {
  if (!navigator.geolocation) return;

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    let nearest = null;
    let minDist = Infinity;

    locations.forEach(l => {
      const d = getDistance(lat, lng, l.lat, l.lng);
      if (d < l.radius && d < minDist) {
        nearest = l;
        minDist = d;
      }
    });

    if (nearest) {
      category.value = nearest.category;
      note.value = nearest.note;
      hint.innerText = "📍 " + nearest.name;
    }
  });
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon/2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function renderLocations(data){
  locationList.innerHTML=data.map(l=>`
    <li>
      <div class="row">
        <div>
          ${l.name}
          <div class="sub">${l.category}</div>
        </div>
        <button class="danger" onclick="delLoc('${l.id}')">刪</button>
      </div>
    </li>
  `).join("");
}

window.delLoc = async(id)=>{
  await deleteDoc(doc(db,"locations",id));
};

// ===== tab =====
window.showTab=(t,el)=>{
  document.querySelectorAll(".tab").forEach(tab=>tab.classList.add("hidden"));
  document.getElementById("tab-"+t).classList.remove("hidden");

  document.querySelectorAll(".tabbar button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
};
</script>

</body>
</html>
